<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صحيفة الحقيقة الذكية</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); }
        .gold-gradient { background: linear-gradient(to right, #D4AF37, #F5E050); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="bg-[#0B132B] text-slate-200 min-h-screen">

    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 glass border-b border-slate-700">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-4 cursor-pointer" onclick="goHome()">
                <div class="w-10 h-10 bg-gradient-to-br from-[#D4AF37] to-yellow-500 rounded-2xl flex items-center justify-center">
                    <span class="text-black font-bold text-2xl">ح</span>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">صحيفة الحقيقة الذكية</h1>
                    <p class="text-xs text-slate-400 -mt-1">الحقيقة... بذكاء لا يُضاهى</p>
                </div>
            </div>

            <div class="flex items-center gap-6">
                <button onclick="toggleDarkMode()" class="p-2 hover:bg-slate-800 rounded-xl">
                    <i data-lucide="sun" id="theme-icon" class="w-5 h-5"></i>
                </button>

                <button onclick="showLoginModal()" id="admin-btn"
                    class="flex items-center gap-2 px-5 py-2.5 bg-red-600 hover:bg-red-700 rounded-2xl font-bold text-sm transition-all">
                    <i data-lucide="shield" class="w-4 h-4"></i>
                    <span>الإدارة العليا</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-28 pb-20 max-w-5xl mx-auto px-6">
        <div class="text-center mb-16">
            <h1 class="text-5xl font-bold gold-gradient mb-4">مرحباً بك في صحيفة الحقيقة الذكية</h1>
            <p class="text-slate-400 text-lg">منصة إعلامية ذكية تعتمد على الذكاء الاصطناعي</p>
        </div>

        <!-- Admin Access Button for Testing -->
        <div class="flex justify-center mb-12">
            <button onclick="showLoginModal()" 
                class="px-8 py-4 bg-gradient-to-r from-red-600 to-red-500 text-white font-bold rounded-2xl flex items-center gap-3 hover:scale-105 transition-all">
                <i data-lucide="shield-check" class="w-5 h-5"></i>
                الدخول إلى الإدارة العليا
            </button>
        </div>
    </main>

    <!-- Login Modal -->
    <div id="login-modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-[100]">
        <div class="bg-slate-900 rounded-3xl p-10 w-full max-w-md border border-slate-700">
            <h2 class="text-2xl font-bold text-center mb-8 text-white">تسجيل الدخول - الإدارة العليا</h2>
            
            <form onsubmit="handleAdminLogin(event)" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">كلمة المرور</label>
                    <input type="password" id="admin-password" 
                        class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-4 text-white focus:border-[#D4AF37] outline-none"
                        placeholder="أدخل كلمة المرور">
                </div>

                <div id="login-error" class="text-red-500 text-center text-sm hidden"></div>

                <button type="submit"
                    class="w-full py-4 bg-[#D4AF37] hover:bg-yellow-400 text-black font-bold rounded-2xl transition-all">
                    دخول
                </button>
            </form>

            <button onclick="hideLoginModal()" 
                class="mt-6 w-full text-slate-400 hover:text-white text-sm">
                إغلاق
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
        }

        function showLoginModal() {
            document.getElementById('login-modal').classList.remove('hidden');
            document.getElementById('login-modal').classList.add('flex');
            document.getElementById('admin-password').focus();
        }

        function hideLoginModal() {
            document.getElementById('login-modal').classList.add('hidden');
            document.getElementById('login-modal').classList.remove('flex');
        }

        function handleAdminLogin(e) {
            e.preventDefault();
            const password = document.getElementById('admin-password').value.trim();
            const errorDiv = document.getElementById('login-error');

            if (password === "Yousif1400@") {
                hideLoginModal();
                alert("✅ تم تسجيل الدخول بنجاح!\n\nأنت الآن داخل الإدارة العليا.\n\n(في النسخة الكاملة سيتم توجيهك إلى لوحة التحكم)");
                // هنا يمكنك إضافة توجيه إلى صفحة الإدارة لاحقاً
            } else {
                errorDiv.textContent = "كلمة المرور غير صحيحة";
                errorDiv.classList.remove('hidden');
                setTimeout(() => errorDiv.classList.add('hidden'), 3000);
            }
        }

        function goHome() {
            window.location.reload();
        }

        // تهيئة Lucide
        window.onload = () => {
            lucide.createIcons();
        };
    </script>
</body>
</html>
